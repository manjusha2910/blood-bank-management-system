<!DOCTYPE html>
<html>
<head>
    <title>Delete Donor</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.15);
            width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #c62828;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #c62828;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #8e0000;
        }

        .back {
            margin-top: 10px;
        }

        .back a {
            text-decoration: none;
            color: #4a90e2;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Delete Donor</h2>

    <form method="POST">

        <select name="donor_id" required>
            {% for donor in donors %}
                <option value="{{ donor[0] }}">
                    ID {{ donor[0] }} - {{ donor[1] }}
                </option>
            {% endfor %}
        </select>

       <button type="submit" onclick="return confirm('Are you sure you want to delete this donor?')">
    Delete Donor
</button>
    </form>

    <div class="back">
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
