<!DOCTYPE html>
<html>
<head>
    <title>Blood Bank Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f9ff;
            overflow: hidden;
        }

        /* Floating Doodles */
        .doodle {
            position: absolute;
            opacity: 0.08;
        }

        .d1 { top: 10%; left: 5%; font-size: 120px; }
        .d2 { bottom: 15%; right: 10%; font-size: 140px; }
        .d3 { top: 40%; right: 5%; font-size: 100px; }

        /* Login Card */
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.15);
            width: 360px;
            text-align: center;
            z-index: 10;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4a90e2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #357abd;
        }

        .subtitle {
            font-size: 13px;
            color: gray;
            margin-top: 15px;
        }

        /* Error Message */
        .error {
            background: #ffe0e0;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- Doodle Icons -->
<div class="doodle d1">🩸</div>
<div class="doodle d2">🚑</div>
<div class="doodle d3">💉</div>

<div class="login-container">
    <h2>Blood Bank Management</h2>

    <!-- ERROR MESSAGE BLOCK -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="subtitle">
        Secure Admin Access
    </div>
</div>

</body>
</html>
