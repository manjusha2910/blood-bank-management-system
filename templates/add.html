<!DOCTYPE html>
<html>
<head>
    <title>Add Donor</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.15);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #357abd;
        }

        .back {
            margin-top: 10px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            color: #4a90e2;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Add New Donor</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Donor Name" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="text" name="blood_group" placeholder="Blood Group (e.g., A+)" required>
        <input type="text" name="city" placeholder="City" required>

        <button type="submit">Add Donor</button>
    </form>

    <div class="back">
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
